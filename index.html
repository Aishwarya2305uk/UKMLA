<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect warms the connection, then load early from the HTML
         (moved out of index.css where the @import was render-blocking). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&display=swap" />

    <!-- ============================================================
         Google Search Console site verification (HTML-tag method).
         Proves ownership of gmcukmla.com so Google will crawl & index it.
         Keep this tag in place — removing it can un-verify the property.
         ============================================================ -->
    <meta name="google-site-verification" content="Wzg1saqqO5NRnxklBzTY_XosuXYuCbkP26OyuthuOX8" />

    <!-- ============================================================
         Google tag (gtag.js) — Google Analytics 4
         Measurement ID: G-NW6TJ34BJZ
         SPA route changes are tracked in src/router.jsx and src/pages/News.jsx
         (page_view is sent per route/post, so send_page_view is disabled here).
         ============================================================ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NW6TJ34BJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // send_page_view:false — the router sends page_view on each SPA navigation
      gtag('config', 'G-NW6TJ34BJZ', { send_page_view: false });
    </script>

    <!-- Crawlability / SEO defaults (per-page values are set in src/router.jsx) -->
    <title>UKMLA - UK Medical Licensing Assessment Guide</title>
    <meta name="description" content="An independent educational resource providing detailed, up-to-date guides, eligibility details, and exam format breakdowns for the UK Medical Licensing Assessment (UKMLA / MLA)." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0d2b4e" />
    <link rel="canonical" href="https://www.gmcukmla.com/" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UKMLA Informational Website" />
    <meta property="og:title" content="UKMLA - UK Medical Licensing Assessment Guide" />
    <meta property="og:description" content="Independent, up-to-date guides on the UK Medical Licensing Assessment (UKMLA / MLA): eligibility, exam format, syllabus, fees and preparation." />
    <meta property="og:url" content="https://www.gmcukmla.com/" />
    <meta property="og:image" content="https://www.gmcukmla.com/logo.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UKMLA - UK Medical Licensing Assessment Guide" />
    <meta name="twitter:description" content="Independent, up-to-date guides on the UK Medical Licensing Assessment (UKMLA / MLA): eligibility, exam format, syllabus, fees and preparation." />
    <meta name="twitter:image" content="https://www.gmcukmla.com/logo.png" />
